name: Deploy to Releases

on:
  workflow_dispatch:
    inputs:
      release_mode:
        description: Release packaging mode
        required: true
        default: signed
        type: choice
        options:
          - signed
          - unsigned-draft
          - auto

permissions:
  contents: write
  id-token: write

jobs:
  deploy:
    name: Deploy Release
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Extract Flagrum Version
        id: setup
        shell: pwsh
        run: |
          [xml]$project = Get-Content src/Flagrum/Flagrum.csproj
          $baseVersion = $project.Project.PropertyGroup.BaseVersion
          $version = $project.Project.PropertyGroup.Version
          $resolved = $version -replace '\$\(.+?\)', $baseVersion
          "version=$resolved" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Flagrum Version: $resolved"
          $prerelease = if ($resolved -match "-") { "true" } else { "false" }
          "prerelease=$prerelease" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Resolve Release Mode
        id: release-mode
        shell: pwsh
        run: |
          $mode = "${{ inputs.release_mode }}"
          if ([string]::IsNullOrWhiteSpace($mode)) {
            $mode = "signed"
          }

          $prerelease = "${{ steps.setup.outputs.prerelease }}" -eq "true"
          $attemptSigning = -not $prerelease -and $mode -ne "unsigned-draft"
          $allowUnsignedFallback = -not $prerelease -and $mode -eq "auto"
          $unsignedRequested = $prerelease -or $mode -eq "unsigned-draft"

          if ($prerelease -and $mode -ne "unsigned-draft") {
            Write-Host "Prerelease versions are packaged unsigned."
          }

          "mode=$mode" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "attempt_signing=$($attemptSigning.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "allow_unsigned_fallback=$($allowUnsignedFallback.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "unsigned_requested=$($unsignedRequested.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Validate Signing Configuration
        id: signing-config
        if: steps.release-mode.outputs.attempt_signing == 'true'
        shell: pwsh
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TRUSTED_SIGNING_ACCOUNT_ENDPOINT: ${{ secrets.TRUSTED_SIGNING_ACCOUNT_ENDPOINT }}
          TRUSTED_SIGNING_ACCOUNT_NAME: ${{ secrets.TRUSTED_SIGNING_ACCOUNT_NAME }}
          CERTIFICATE_PROFILE_NAME: ${{ secrets.CERTIFICATE_PROFILE_NAME }}
        run: |
          $requiredSecrets = @{
            AZURE_CLIENT_ID = $env:AZURE_CLIENT_ID
            AZURE_TENANT_ID = $env:AZURE_TENANT_ID
            AZURE_SUBSCRIPTION_ID = $env:AZURE_SUBSCRIPTION_ID
            TRUSTED_SIGNING_ACCOUNT_ENDPOINT = $env:TRUSTED_SIGNING_ACCOUNT_ENDPOINT
            TRUSTED_SIGNING_ACCOUNT_NAME = $env:TRUSTED_SIGNING_ACCOUNT_NAME
            CERTIFICATE_PROFILE_NAME = $env:CERTIFICATE_PROFILE_NAME
          }

          $missing = @(
            foreach ($secret in $requiredSecrets.GetEnumerator()) {
              if ([string]::IsNullOrWhiteSpace($secret.Value)) {
                $secret.Key
              }
            }
          )

          if ($missing.Count -gt 0) {
            $message = "Missing signing configuration secrets: $($missing -join ', ')"
            if ("${{ steps.release-mode.outputs.allow_unsigned_fallback }}" -eq "true") {
              Write-Warning "$message. Auto mode will create an unsigned draft release."
              "ready=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
              exit 0
            }

            throw $message
          }

          "ready=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Generate metadata.json for Azure Trusted Signing
        if: steps.signing-config.outputs.ready == 'true'
        shell: pwsh
        run: |
          $jsonContent = @{
            Endpoint = "${{ secrets.TRUSTED_SIGNING_ACCOUNT_ENDPOINT }}"
            CodeSigningAccountName = "${{ secrets.TRUSTED_SIGNING_ACCOUNT_NAME }}"
            CertificateProfileName = "${{ secrets.CERTIFICATE_PROFILE_NAME }}"
            CorrelationId = "github-${{ github.run_id }}-${{ github.run_attempt }}"
          } | ConvertTo-Json -Depth 10
          $utf8NoBom = New-Object System.Text.UTF8Encoding $False
          [System.IO.File]::WriteAllText('metadata.json', $jsonContent, $utf8NoBom)

      - name: Install Azure CLI
        id: azure-cli
        if: steps.signing-config.outputs.ready == 'true'
        continue-on-error: ${{ steps.release-mode.outputs.allow_unsigned_fallback == 'true' }}
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://aka.ms/installazurecliwindows -OutFile .\AzureCLIInstaller.msi
          Start-Process -FilePath .\AzureCLIInstaller.msi -ArgumentList '/quiet' -Wait

      - name: Log in to Azure
        id: azure-login
        if: steps.signing-config.outputs.ready == 'true' && steps.azure-cli.outcome == 'success'
        continue-on-error: ${{ steps.release-mode.outputs.allow_unsigned_fallback == 'true' }}
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish Flagrum
        run: dotnet publish src/Flagrum/Flagrum.csproj -c Release -o publish -r win-x64 --self-contained true

      - name: Copy External Dependencies
        run: xcopy libs\* publish\ /Y

      - name: Download Previous Release
        if: steps.setup.outputs.prerelease == 'false' && steps.release-mode.outputs.mode != 'unsigned-draft'
        id: download-previous
        uses: robinraju/release-downloader@v1.9
        continue-on-error: true
        with:
          repository: "Tzeentchnet/Flagrum"
          latest: true
          fileName: "*"
          tarBall: false
          zipBall: false
          out-file-path: "Releases"
          extract: false

      - name: Delete Previous Setup and Excess Deltas
        id: cleanup-release
        if: steps.download-previous.outcome == 'success' && steps.setup.outputs.prerelease == 'false'
        shell: pwsh
        run: |
          Set-Location Releases
          Remove-Item Setup.exe -ErrorAction SilentlyContinue

          $fullPackage = Get-ChildItem -File -Filter 'Flagrum-*-full.nupkg' | Sort-Object Name | Select-Object -Last 1
          if ($null -ne $fullPackage) {
            "full=$($fullPackage.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }

          $deltaPackages = @(Get-ChildItem -File -Filter 'Flagrum-*-delta.nupkg' | Sort-Object Name)
          if ($deltaPackages.Count -gt 5) {
            $deltaPackages | Select-Object -First ($deltaPackages.Count - 5) | Remove-Item -Force
          }

      - name: Create Signed Velopack Release
        id: signed-pack
        if: steps.signing-config.outputs.ready == 'true' && steps.azure-cli.outcome == 'success' && steps.azure-login.outcome == 'success'
        continue-on-error: ${{ steps.release-mode.outputs.allow_unsigned_fallback == 'true' }}
        shell: pwsh
        env:
          DOTNET_ROLL_FORWARD: Major
        run: |
          $vpkInstalled = dotnet tool list -g | Select-String '^vpk\s'
          if ($vpkInstalled) {
            dotnet tool update -g vpk
          }
          else {
            dotnet tool install -g vpk
          }

          vpk pack -u Flagrum -v ${{ steps.setup.outputs.version }} -p publish -e Flagrum.exe -s .github/images/Splash.png -i src/Flagrum/Resources/flagrum.ico --packAuthors "Tzeentchnet" --packTitle Flagrum --noPortable --azureTrustedSignFile metadata.json --exclude '.*\.zzzzz'
          Move-Item -Path Releases/Flagrum-win-Setup.exe -Destination Releases/Setup.exe -Force

      - name: Create Unsigned Velopack Release
        id: unsigned-pack
        if: steps.release-mode.outputs.unsigned_requested == 'true' || (steps.release-mode.outputs.allow_unsigned_fallback == 'true' && (steps.signing-config.outputs.ready != 'true' || steps.azure-cli.outcome != 'success' || steps.azure-login.outcome != 'success' || steps.signed-pack.outcome == 'failure'))
        shell: pwsh
        env:
          DOTNET_ROLL_FORWARD: Major
        run: |
          if (Test-Path Releases) {
            Remove-Item -Path Releases -Recurse -Force
          }

          $vpkInstalled = dotnet tool list -g | Select-String '^vpk\s'
          if ($vpkInstalled) {
            dotnet tool update -g vpk
          }
          else {
            dotnet tool install -g vpk
          }

          Write-Warning "Creating unsigned release assets. Keep the GitHub release as a draft until unsigned distribution is intentional."
          vpk pack -u Flagrum -v ${{ steps.setup.outputs.version }} -p publish -e Flagrum.exe -s .github/images/Splash.png -i src/Flagrum/Resources/flagrum.ico --packAuthors "Tzeentchnet" --packTitle Flagrum --noPortable --exclude '.*\.zzzzz'
          Move-Item -Path Releases/Flagrum-win-Setup.exe -Destination Releases/Setup.exe -Force

      - name: Verify Signed Release
        if: steps.signed-pack.outcome == 'success'
        shell: pwsh
        run: |
          $signature = Get-AuthenticodeSignature -FilePath Releases/Setup.exe
          $signature | Format-List Status, StatusMessage, SignerCertificate
          if ($signature.Status -ne 'Valid') {
            throw "Setup.exe signature is not valid. Status: $($signature.Status); $($signature.StatusMessage)"
          }

      - name: Generate Release Body
        if: steps.signed-pack.outcome == 'success' || steps.unsigned-pack.outcome == 'success'
        shell: pwsh
        run: |
          $unsignedWarning = ""
          if ("${{ steps.unsigned-pack.outcome }}" -eq "success") {
            $unsignedWarning = @"
          > [!WARNING]
          > This draft contains unsigned release assets. Publish it only if unsigned distribution is intentional.

          "@
          }

          $body = @"
          $unsignedWarning## English / 英語

          Download and run Setup.exe to install Flagrum.

          IMPORTANT: The [companion add-on for Blender](https://github.com/Tzeentchnet/Flagrum-Blender/releases/latest) is required for certain asset importing and creating Steam Workshop mods.
          &nbsp;

          ## 日本語 / Japanese

          フラーグルムをインストールするために「Setup.exe」をダウンロードし、実行します。

          重要：特定のアセットのインポートとSteamワークショップのMODの作成には、[Blender用のコンパニオンアドオン](https://github.com/Tzeentchnet/Flagrum-Blender/releases/latest)が必要です。
          "@

          $utf8NoBom = New-Object System.Text.UTF8Encoding $False
          [System.IO.File]::WriteAllText('release-body.md', $body.Trim(), $utf8NoBom)

      - name: Delete Previous '-full' Package
        if: steps.download-previous.outcome == 'success' && steps.signed-pack.outcome == 'success' && steps.cleanup-release.outputs.full != ''
        shell: pwsh
        run: Remove-Item -Path (Join-Path 'Releases' '${{ steps.cleanup-release.outputs.full }}') -Force -ErrorAction SilentlyContinue

      - name: Create GitHub Release
        if: steps.signed-pack.outcome == 'success' || steps.unsigned-pack.outcome == 'success'
        uses: ncipollo/release-action@v1.21.0
        with:
          tag: v${{ steps.setup.outputs.version }}
          commit: ${{ github.sha }}
          name: Flagrum ${{ steps.setup.outputs.version }}
          bodyFile: release-body.md
          draft: true
          prerelease: ${{ steps.setup.outputs.prerelease }}
          owner: Tzeentchnet
          repo: Flagrum
          token: ${{ secrets.GITHUB_TOKEN }}
          artifactErrorsFailBuild: true
          artifacts: "Releases/*.nupkg,Releases/assets.win.json,Releases/releases.win.json,Releases/Setup.exe,Releases/RELEASES"
          allowUpdates: true
          updateOnlyUnreleased: true
          removeArtifacts: true
          replacesArtifacts: true
          makeLatest: false